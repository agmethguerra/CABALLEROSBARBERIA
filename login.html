<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Caballeros Barbería</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./shared/styles.css">
  <script src="./shared/db.js"></script>
  <script src="./shared/auth.js"></script>
  <script src="./shared/utils.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 30% 70%, rgba(139,0,0,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.07) 0%, transparent 50%);
    }
    .login-wrapper { width: 100%; max-width: 400px; padding: 20px; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .login-emblem { text-align: center; margin-bottom: 32px; }
    .login-crest { width: 72px; height: 72px; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); border-radius: 18px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 8px 24px rgba(139,0,0,0.4); }
    .login-title { font-family: var(--font-display); font-size: 26px; color: var(--gold); margin: 0 0 4px; }
    .login-sub { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }
    .login-fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
    .input-wrap .input { padding-left: 42px; }
    .login-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; letter-spacing: 0.04em; border-radius: 12px; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-dim); }
    .enter-key-hint { text-align:center; font-size:11px; color:var(--text-dim); margin-top:10px; }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-emblem">
      <h1 class="login-title">Caballeros</h1>
      <p class="login-sub">Sistema de gestión</p>
    </div>

    <div class="login-fields">
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input id="user" class="input" placeholder="Usuario" autocomplete="username">
      </div>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input id="pass" type="password" class="input" placeholder="Contraseña" autocomplete="current-password">
      </div>
    </div>

    <button class="btn btn-gold login-btn" onclick="doLogin()">Ingresar</button>
    <p class="enter-key-hint">Presiona Enter para ingresar</p>

    <div class="login-footer">Caballeros Barbería &copy; 2025</div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await openDB();
    await auth.seedDefaultUsers();
    document.getElementById('user').focus();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value;
    if (!u || !p) { utils.showToast('Completa usuario y contraseña', 'error'); return; }
    const s = await auth.login(u, p);
    if (!s) { utils.showToast('Credenciales incorrectas', 'error'); return; }
    if (s.role === 'admin') location.href = './admin/index.html';
    else location.href = './barber/index.html';
  }
</script>
</body>
</html>
